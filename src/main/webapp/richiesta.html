<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <title>Form di soccorso - Invia la richiesta</title>
        <link rel="stylesheet" type="text/css" href="css/style.css">
    </head>
    <body>

        <main class="card-container-form">

            <a href="homeFinale.html" class="link-back">&larr; Torna alla home</a>

            <h2 class="section-title">Richiesta di soccorso immediato</h2>
            <p class="text-muted">Compila i campi qui sotto:</p>

            <form action="CreaRichiestaServlet" method="POST" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="nome" class="form-label">Il tuo nome:</label>
                    <input type="text" id="nome" name="nome_segnalante" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">La tua e-mail:</label>
                    <input type="email" id="email" name="email_segnalante" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="posizione" class="form-label">Dove ti trovi, indirizzo:</label>
                    <input type="text" id="posizione" name="posizione" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="descrizione" class="form-label">Descrivi brevemente l'emergenza:</label>
                    <textarea id="descrizione" name="descrizione" rows="4" required class="form-control"></textarea>
                </div>

                <div class="form-group">
                    <label for="foto" class="form-label">Foto dell'emergenza (Opzionale):</label>
                    <input type="file" id="foto" name="foto" accept="image/*" class="form-control-file">
                </div>

                <fieldset class="fieldset-antispam">
                    <p>
                        <span id="domandaCaptcha">Caricamento captcha...</span><br>
                        <input type="number" id="captcha" name="captcha" required class="form-control-small">
                    </p>
                </fieldset>

                <button type="submit" class="btn-primary-full">Invia richiesta</button>
            </form>

        </main>
        
        <script src="js/richiesta.js"></script>
        
    </body>
</html>
