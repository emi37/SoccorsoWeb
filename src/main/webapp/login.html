<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SoccorsoWeb - Accesso area riservata ADMIN</title>
</head>
<body style="font-family: Arial; padding: 50px; background-color: #e9ecef;">

    <div style="max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);">
        <h2 style="color: #343a40; text-align: center;">Accesso personale per ADMIN</h2>
        <p style="text-align: center; color: gray;">Inserisci le credenziali per accedere alla dashboard di controllo</p>
        
        <form action="LoginServlet" method="POST">
            <label for="email"><b>E mail:</b></label><br>
            <input type="email" id="email" name="email" style="width: 100%; padding: 10px; margin: 8px 0;" required><br>

            <label for="password"><b>Password:</b></label><br>
            <input type="password" id="password" name="password" style="width: 100%; padding: 10px; margin: 8px 0;" required><br><br>

            <button type="submit" style="width: 100%; background-color: #007bff; color: white; padding: 14px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">Accedi</button>
        </form>
    </div>

</body>
</html>
