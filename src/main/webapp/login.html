<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoccorsoWeb - Accesso area riservata ADMIN ed Operatori</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
    </style>
</head>
<body style="font-family: Arial, sans-serif; padding: 15px; background-color: #e9ecef; margin: 0; display: flex; align-items: center; min-height: 100vh;">

    <div style="max-width: 400px; width: 100%; margin: auto; background: white; padding: 30px 20px; border-radius: 8px; box-shadow: 0px 4px 15px rgba(0,0,0,0.08);">
        
        <h2 style="color: #343a40; text-align: center; margin-top: 0; font-size: 24px;">Accesso Personale</h2>
        <p style="text-align: center; color: #6c757d; font-size: 14px; margin-bottom: 25px; line-height: 1.4;">
            Inserisci le credenziali per accedere alla tua dashboard di controllo
        </p>
        
        <form action="LoginServlet" method="POST">
            <div style="margin-bottom: 16px;">
                <label for="email" style="font-weight: bold; color: #495057; font-size: 14px;">E-mail:</label>
                <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px;">
            </div>

            <div style="margin-bottom: 24px;">
                <label for="password" style="font-weight: bold; color: #495057; font-size: 14px;">Password:</label>
                <input type="password" id="password" name="password" required style="width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px;">
            </div>

            <button type="submit" style="width: 100%; background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s;">Accedi</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="home_finale.html" style="color: #6c757d; text-decoration: none; font-size: 13px; font-weight: bold;">&larr; Torna alla Home pubblica</a>
        </div>
    </div>

</body>
</html>
