<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Form di soccorso - Invia la richiesta</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; background-color: #f4f6f9; margin: 0;">

    <div style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.05);">
        
        <h2 style="margin-top: 0; color: #333;">Richiesta di soccorso immediato</h2>
        <p style="color: #666; margin-bottom: 25px;">Compila i campi qui sotto:</p>

        <form action="CreaRichiestaServlet" method="POST" enctype="multipart/form-data">
            
            <div style="margin-bottom: 18px;">
                <label for="nome" style="font-weight: bold; color: #495057;">Il tuo nome:</label>
                <input type="text" id="nome" name="nome_segnalante" required style="width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
            </div>

            <div style="margin-bottom: 18px;">
                <label for="email" style="font-weight: bold; color: #495057;">La tua e-mail:</label>
                <input type="email" id="email" name="email_segnalante" required style="width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
            </div>

            <div style="margin-bottom: 18px;">
                <label for="posizione" style="font-weight: bold; color: #495057;">Dove ti trovi, indirizzo:</label>
                <input type="text" id="posizione" name="posizione" required style="width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
            </div>

            <div style="margin-bottom: 18px;">
                <label for="descrizione" style="font-weight: bold; color: #495057;">Descrivi brevemente l'emergenza:</label>
                <textarea id="descrizione" name="descrizione" rows="4" required style="width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px; font-family: Arial, sans-serif; resize: vertical;"></textarea>
            </div>

            <div style="margin-bottom: 22px;">
                <label for="foto" style="font-weight: bold; color: #495057;">Foto dell'emergenza (Opzionale):</label>
                <input type="file" id="foto" name="foto" accept="image/*" style="width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px; background-color: white;">
            </div>

            <fieldset style="border: 1px solid #dee2e6; border-radius: 6px; padding: 15px; margin-bottom: 25px; background-color: #f8f9fa;">
                <legend style="font-weight: bold; color: #495057; padding: 0 8px;">Controllo anti-spam</legend>
                <label for="captcha" style="color: #495057;">Quanto fa 3 + 4?</label><br>
                <input type="number" id="captcha" name="captcha" required style="width: 120px; padding: 8px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
            </fieldset>

            <button type="submit" style="width: 100%; background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background-color 0.2s;">Invia richiesta</button>
        </form>
        
    </div>

</body>
</html>
